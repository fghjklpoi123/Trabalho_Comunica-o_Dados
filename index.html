<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Usuários</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 420px;
      padding: 36px 32px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #eee;
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 8px 18px;
      font-size: 15px;
      cursor: pointer;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .tab-btn.active {
      color: #4f46e5;
      border-bottom: 2px solid #4f46e5;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
      margin-top: 14px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
      background: #fafafa;
    }

    input:focus { border-color: #4f46e5; background: #fff; }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.90; }
    .btn:active { transform: scale(0.98); }

    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-danger { background: #e53e3e; color: #fff; }
    .btn-secondary { background: #eee; color: #555; }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 14px;
      display: none;
    }

    .msg.success { background: #e6f9f0; color: #1a7a4a; display: block; }
    .msg.error   { background: #fff0f0; color: #c0392b; display: block; }

    .user-card {
      background: #f8f8ff;
      border: 1px solid #e0e0f0;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 12px;
    }

    .user-card p { font-size: 14px; margin: 3px 0; color: #444; }
    .user-card strong { color: #1a1a2e; }

    .token-box {
      font-size: 11px;
      color: #888;
      background: #f4f4f4;
      border-radius: 6px;
      padding: 8px;
      margin-top: 10px;
      word-break: break-all;
      display: none;
    }

    .dashboard { display: none; }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .btn-sm:hover { opacity: 0.85; }

    .user-list { margin-top: 8px; }

    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #fff;
    }

    .user-item .info p { font-size: 13px; margin: 1px 0; }
    .user-item .info p:first-child { font-weight: 600; color: #1a1a2e; }
    .user-item .info p:last-child { color: #888; }

    .actions { display: flex; gap: 6px; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- TELA DE AUTH -->
<div class="container" id="auth-section">
  <h1>Sistema de Usuários</h1>
  <p class="subtitle">Faça login ou crie sua conta</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" onclick="switchTab('register')">Cadastro</button>
  </div>

  <!-- LOGIN -->
  <div class="tab-panel active" id="tab-login">
    <label>E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••">
    <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
    <div class="msg" id="login-msg"></div>
    <div class="token-box" id="token-display"></div>
  </div>

  <!-- CADASTRO -->
  <div class="tab-panel" id="tab-register">
    <label>Nome</label>
    <input type="text" id="reg-nome" placeholder="Seu nome completo">
    <label>E-mail</label>
    <input type="email" id="reg-email" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="reg-senha" placeholder="••••••••">
    <button class="btn btn-primary" onclick="fazerCadastro()">Criar conta</button>
    <div class="msg" id="reg-msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container dashboard" id="dashboard-section" style="max-width: 560px;">
  <div class="dashboard-header">
    <div>
      <h1>Usuários</h1>
      <p class="subtitle" id="logado-como"></p>
    </div>
    <button class="btn-sm" style="background:#eee; color:#555;" onclick="logout()">Sair</button>
  </div>

  <button class="btn btn-primary" style="margin-top:0; margin-bottom:16px;" onclick="carregarUsuarios()">
    Atualizar lista
  </button>

  <div class="user-list" id="user-list">
    <p style="color:#aaa; font-size:14px;">Clique em "Atualizar lista" para carregar.</p>
  </div>

  <div class="msg" id="dash-msg"></div>
</div>

<script>
  const API = 'http://localhost:3000';
  let token = '';

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function showMsg(id, text, tipo) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + tipo;
  }

  async function fazerLogin() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;

    if (!email || !senha) return showMsg('login-msg', 'Preencha e-mail e senha.', 'error');

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();

      if (!res.ok) return showMsg('login-msg', data.error || 'Erro ao fazer login.', 'error');

      token = data.token;
      const tokenBox = document.getElementById('token-display');
      tokenBox.textContent = 'Token: ' + token;
      tokenBox.style.display = 'block';

      setTimeout(() => abrirDashboard(email), 800);
      showMsg('login-msg', 'Login realizado! Entrando...', 'success');
    } catch (e) {
      showMsg('login-msg', 'Não foi possível conectar à API.', 'error');
    }
  }

  async function fazerCadastro() {
    const nome  = document.getElementById('reg-nome').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const senha = document.getElementById('reg-senha').value;

    if (!nome || !email || !senha) return showMsg('reg-msg', 'Preencha todos os campos.', 'error');

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha })
      });
      const data = await res.json();

      if (!res.ok) return showMsg('reg-msg', data.error || 'Erro ao cadastrar.', 'error');

      showMsg('reg-msg', `Conta criada! Faça login, ${data.nome}.`, 'success');
      setTimeout(() => switchTab('login'), 1500);
    } catch (e) {
      showMsg('reg-msg', 'Não foi possível conectar à API.', 'error');
    }
  }

  function abrirDashboard(email) {
    document.getElementById('auth-section').style.display = 'none';
    const dash = document.getElementById('dashboard-section');
    dash.style.display = 'block';
    document.getElementById('logado-como').textContent = 'Logado como: ' + email;
    carregarUsuarios();
  }

  async function carregarUsuarios() {
    const list = document.getElementById('user-list');
    list.innerHTML = '<p style="color:#aaa; font-size:14px;"><span class="spinner"></span> Carregando...</p>';

    try {
      const res = await fetch(`${API}/usuarios`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (res.status === 403) {
        list.innerHTML = '<p style="color:#c0392b; font-size:14px;">Token expirado. Faça login novamente.</p>';
        return;
      }

      const usuarios = await res.json();

      if (!usuarios.length) {
        list.innerHTML = '<p style="color:#aaa; font-size:14px;">Nenhum usuário cadastrado.</p>';
        return;
      }

      list.innerHTML = usuarios.map(u => `
        <div class="user-item">
          <div class="info">
            <p>${u.nome}</p>
            <p>${u.email}</p>
          </div>
          <div class="actions">
            <button class="btn-sm" style="background:#4f46e5; color:#fff;"
              onclick="editarUsuario(${u.id}, '${u.nome}', '${u.email}')">
              Editar
            </button>
            <button class="btn-sm" style="background:#ffe5e5; color:#c0392b;"
              onclick="deletarUsuario(${u.id})">
              Excluir
            </button>
          </div>
        </div>
      `).join('');
    } catch (e) {
      list.innerHTML = '<p style="color:#c0392b; font-size:14px;">Erro ao buscar usuários.</p>';
    }
  }

  async function deletarUsuario(id) {
    if (!confirm('Tem certeza que deseja excluir este usuário?')) return;

    try {
      const res = await fetch(`${API}/usuarios/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      showMsg('dash-msg', data.message || 'Usuário excluído.', res.ok ? 'success' : 'error');
      if (res.ok) carregarUsuarios();
    } catch (e) {
      showMsg('dash-msg', 'Erro ao excluir usuário.', 'error');
    }
  }

  async function editarUsuario(id, nomeAtual, emailAtual) {
    const novoNome  = prompt('Novo nome:', nomeAtual);
    if (novoNome === null) return;
    const novoEmail = prompt('Novo e-mail:', emailAtual);
    if (novoEmail === null) return;

    try {
      const res = await fetch(`${API}/usuarios/${id}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ nome: novoNome, email: novoEmail })
      });
      const data = await res.json();
      showMsg('dash-msg', data.message || data.error, res.ok ? 'success' : 'error');
      if (res.ok) carregarUsuarios();
    } catch (e) {
      showMsg('dash-msg', 'Erro ao atualizar usuário.', 'error');
    }
  }

  function logout() {
    token = '';
    document.getElementById('dashboard-section').style.display = 'none';
    document.getElementById('auth-section').style.display = 'block';
    document.getElementById('login-email').value = '';
    document.getElementById('login-senha').value = '';
    document.getElementById('login-msg').className = 'msg';
    document.getElementById('token-display').style.display = 'none';
  }
</script>
</body>
</html>
